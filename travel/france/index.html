<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파리 여행 일기 — MY.BLOG</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0c0f;--surface:#13161a;--surface2:#1a1e24;--border:#252a32;--text:#eef0f3;--muted:#7a8494;--accent:#f0c090;--accent2:#d4a070;--tag-bg:#1a1308;--radius:14px}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;line-height:1.6}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:rgba(10,12,15,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .nav-back{font-size:.78rem;color:var(--muted);text-decoration:none;letter-spacing:.06em;transition:color .2s}.nav-back:hover{color:var(--text)}
    .nav-links{display:flex;gap:20px;list-style:none}.nav-links a{font-size:.83rem;color:var(--muted);text-decoration:none;transition:color .2s}.nav-links a:hover{color:var(--text)}.nav-accent{color:var(--accent)!important}
    .hero{min-height:100vh;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:0 56px 88px}
    .hero-photo{position:absolute;inset:0;background:center/cover no-repeat}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,12,15,.1) 0%,rgba(10,12,15,.3) 40%,rgba(10,12,15,.88) 80%,rgba(10,12,15,.97) 100%)}
    .hero-content{position:relative;z-index:1}
    .hero-eyebrow{font-size:.72rem;letter-spacing:.22em;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
    .hero-title{font-size:clamp(2.8rem,6vw,5.5rem);font-weight:900;line-height:1.07;letter-spacing:-.03em;max-width:760px;margin-bottom:22px}
    .hero-title em{font-style:normal;color:var(--accent)}
    .hero-desc{font-size:1.05rem;color:var(--muted);max-width:460px;margin-bottom:38px;line-height:1.85}
    .hero-cta{display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:#0d0804;padding:12px 24px;border-radius:999px;font-size:.88rem;font-weight:800;text-decoration:none;transition:background .2s,transform .15s}.hero-cta:hover{background:var(--accent2);transform:translateY(-2px)}
    .hero-stats{position:absolute;right:56px;bottom:88px;display:flex;flex-direction:column;gap:28px;text-align:right;z-index:1}
    .stat-num{font-size:2.4rem;font-weight:900;color:var(--accent);line-height:1}.stat-label{font-size:.7rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
    section{padding:96px 56px}
    .section-eyebrow{font-size:.7rem;letter-spacing:.22em;color:var(--accent);text-transform:uppercase;margin-bottom:14px}
    .section-title{font-size:clamp(1.7rem,3vw,2.5rem);font-weight:900;letter-spacing:-.025em;margin-bottom:48px}
    #featured{background:var(--surface)}
    .featured-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:3px;border-radius:var(--radius);overflow:hidden}
    .featured-main{background:var(--surface2);padding:48px;display:flex;flex-direction:column;justify-content:flex-end;min-height:480px;position:relative;cursor:pointer;transition:filter .2s}.featured-main:hover{filter:brightness(1.08)}
    .featured-main .bg{position:absolute;inset:0}
    .featured-main .content{position:relative;z-index:1}
    .featured-side{display:flex;flex-direction:column;gap:3px}
    .side-card{background:var(--surface2);padding:32px 36px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;position:relative;cursor:pointer;overflow:hidden;transition:filter .2s}.side-card:hover{filter:brightness(1.08)}
    .side-card .bg{position:absolute;inset:0}.side-card .content{position:relative;z-index:1}
    .entry-tag{display:inline-block;background:var(--tag-bg);border:1px solid rgba(240,192,144,.3);color:var(--accent);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:4px;margin-bottom:12px}
    .entry-date{font-size:.73rem;color:var(--muted);letter-spacing:.06em;margin-bottom:7px}
    .entry-title{font-size:1.4rem;font-weight:800;letter-spacing:-.02em;line-height:1.2;margin-bottom:10px}
    .side-card .entry-title{font-size:1rem}
    .entry-excerpt{font-size:.87rem;color:var(--muted);line-height:1.72}
    .entry-meta{display:flex;align-items:center;gap:12px;margin-top:16px;font-size:.76rem;color:var(--muted);flex-wrap:wrap}
    #entries{background:var(--bg)}
    .entries-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .entry-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s}.entry-card:hover{border-color:rgba(240,192,144,.4);transform:translateY(-5px)}
    .card-thumb{width:100%;height:200px;object-fit:cover;display:block;background:var(--surface2)}
    .card-body{padding:24px}.card-body .entry-title{font-size:1rem;margin-bottom:8px}.card-body .entry-excerpt{font-size:.81rem}
    .mood{font-size:.71rem;color:var(--muted);margin-top:12px}
    #gallery{background:var(--surface)}
    .gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:210px;gap:5px;border-radius:var(--radius);overflow:hidden}
    .gallery-item{overflow:hidden;cursor:pointer;position:relative}.gallery-item:first-child{grid-column:span 2;grid-row:span 2}.gallery-item:nth-child(5){grid-column:span 2}
    .gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}.gallery-item:hover img{transform:scale(1.06)}
    .gallery-item .ov{position:absolute;inset:0;background:rgba(10,12,15,0);transition:background .3s}.gallery-item:hover .ov{background:rgba(10,12,15,.25)}
    .gallery-more{margin-top:20px;text-align:center}.gallery-more button{background:transparent;border:1px solid var(--border);color:var(--muted);padding:10px 24px;border-radius:999px;font-size:.82rem;cursor:pointer;transition:all .2s}.gallery-more button:hover{border-color:var(--accent);color:var(--accent)}
    .quote-section{padding:96px 56px;background:var(--bg);text-align:center;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .quote-mark{font-size:4rem;color:var(--accent);line-height:.6;margin-bottom:22px;font-family:Georgia,serif}
    .quote-text{font-size:clamp(1.3rem,2.2vw,1.8rem);font-weight:800;letter-spacing:-.02em;max-width:640px;margin:0 auto 16px;line-height:1.45}
    .quote-src{font-size:.8rem;color:var(--muted);letter-spacing:.1em}
    footer{padding:48px 56px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .footer-logo{font-size:.9rem;font-weight:800;color:var(--accent);letter-spacing:.08em}.footer-text{font-size:.77rem;color:var(--muted)}
    .modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:24px}.modal-overlay.open{display:flex}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:820px;max-height:90vh;overflow-y:auto;position:relative}
    .modal-close{position:sticky;top:12px;float:right;margin:12px 16px 0 0;background:var(--surface2);border:none;color:var(--muted);width:36px;height:36px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
    .modal-hero{width:100%;height:320px;object-fit:cover;display:block;border-radius:20px 20px 0 0}
    .modal-bwrap{padding:36px 44px 44px}.modal-title{font-size:1.65rem;font-weight:900;letter-spacing:-.025em;margin-bottom:22px}.modal-divider{border:none;border-top:1px solid var(--border);margin-bottom:24px}
    .modal-text{font-size:.92rem;line-height:1.9;color:#c0c8d4}.modal-text p{margin-bottom:16px}
    .modal-photos{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:28px;border-radius:8px;overflow:hidden}
    .modal-photos img{width:100%;height:100px;object-fit:cover;cursor:pointer;transition:opacity .2s}.modal-photos img:hover{opacity:.8}
    .modal-footer-meta{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:16px;font-size:.76rem;color:var(--muted);flex-wrap:wrap}
    .lightbox{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.97);align-items:center;justify-content:center}.lightbox.open{display:flex}
    .lightbox img{max-width:92vw;max-height:90vh;object-fit:contain;border-radius:6px}
    .lb-close{position:absolute;top:20px;right:24px;background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:none;color:#fff;width:48px;height:48px;border-radius:50%;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,.25)}.lb-prev{left:20px}.lb-next{right:20px}
    .lb-count{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:.8rem;color:rgba(255,255,255,.5);letter-spacing:.1em}
    .reveal{opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease}.reveal.visible{opacity:1;transform:none}
    @media(max-width:768px){nav{padding:0 16px;height:56px}.nav-links{gap:4px}.nav-links a{font-size:.72rem}.hero{padding:0 20px 56px}.hero-stats{display:none}section{padding:56px 20px}.featured-grid{grid-template-columns:1fr}.featured-main{min-height:300px;padding:28px}.featured-side{flex-direction:column}.side-card{min-height:200px;padding:24px}.entries-grid{grid-template-columns:1fr}.gallery-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:150px}.gallery-item:first-child{grid-column:span 1;grid-row:span 1}.gallery-item:nth-child(5){grid-column:span 1}.quote-section{padding:56px 20px}.modal-overlay{padding:0;align-items:flex-end}.modal{border-radius:20px 20px 0 0;max-height:90vh}.modal-hero{height:220px;border-radius:20px 20px 0 0}.modal-bwrap{padding:24px 20px 32px}.modal-photos{grid-template-columns:repeat(3,1fr)}.modal-photos img{height:80px}footer{padding:28px 20px;flex-direction:column;gap:6px}}
  </style>
</head>
<body>
<nav>
  <a class="nav-back" href="../../index.html">← MY.BLOG</a>
  <ul class="nav-links">
    <li><a href="#featured">하이라이트</a></li>
    <li><a href="#entries">일기</a></li>
    <li><a href="#gallery">사진첩</a></li>
    <li><a href="../index.html" class="nav-accent">✈️ 여행 목록</a></li>
  </ul>
</nav>

<section class="hero" id="home">
  <div class="hero-photo"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-eyebrow"></p>
    <h1 class="hero-title"></h1>
    <p class="hero-desc"></p>
    <a class="hero-cta" href="#featured">일기 읽기 →</a>
  </div>
  <div class="hero-stats"></div>
</section>

<section id="featured">
  <p class="section-eyebrow reveal">✦ Highlights</p>
  <h2 class="section-title reveal">이번 여행의 하이라이트</h2>
  <div class="featured-grid reveal">
    <div class="featured-main"><div class="bg"></div><div class="content"></div></div>
    <div class="featured-side">
      <div class="side-card"><div class="bg"></div><div class="content"></div></div>
      <div class="side-card"><div class="bg"></div><div class="content"></div></div>
    </div>
  </div>
</section>

<section id="entries">
  <p class="section-eyebrow reveal">✦ Travel Diary</p>
  <h2 class="section-title reveal">여행 일기</h2>
  <div class="entries-grid" id="entries-grid"></div>
</section>

<section id="gallery">
  <p class="section-eyebrow reveal">✦ Photo Gallery</p>
  <h2 class="section-title reveal">사진첩</h2>
  <div class="gallery-grid" id="gallery-grid"></div>
  <div class="gallery-more reveal"><button id="gallery-more-btn">전체 사진 보기 →</button></div>
</section>

<div class="quote-section">
  <div class="quote-mark">"</div>
  <p class="quote-text" id="quote-text"></p>
  <p class="quote-src" id="quote-source"></p>
</div>

<footer>
  <div class="footer-logo" id="footer-name"></div>
  <div class="footer-text">파리 · 웨딩 스냅</div>
</footer>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal"><button class="modal-close" onclick="closeModal()">✕</button><div id="modal-inner"></div></div>
</div>
<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-prev" onclick="lbNav(-1)">‹</button>
  <img id="lb-img" src="" alt="" />
  <button class="lb-next" onclick="lbNav(1)">›</button>
  <div class="lb-count" id="lb-count"></div>
</div>

<script src="../../data.js"></script>
<script src="../../js/blog.js"></script>
<script>initTravelPage('france');</script>
</body>
</html>
