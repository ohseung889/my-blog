<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일기 — MY.BLOG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c0f; --surface: #13161a; --surface2: #1a1e24;
      --border: #252a32; --text: #eef0f3; --muted: #7a8494;
      --accent: #f5a66c; --radius: 16px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; line-height: 1.6; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 56px; height: 64px;
      background: rgba(10,12,15,0.88); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-size: 1rem; font-weight: 900; letter-spacing: 0.06em; color: var(--text); text-decoration: none; }
    .nav-logo span { color: #6cb8f5; }
    .nav-links { display: flex; gap: 8px; list-style: none; }
    .nav-links a { font-size: 0.82rem; color: var(--muted); text-decoration: none; padding: 6px 14px; border-radius: 999px; transition: color 0.2s, background 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--surface2); }

    .page-header { padding: 140px 56px 72px; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
    .page-header::before { content: '📝'; position: absolute; right: 80px; top: 80px; font-size: 12rem; opacity: 0.04; pointer-events: none; }
    .breadcrumb { font-size: 0.75rem; color: var(--muted); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--text); }
    .page-title { font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 900; letter-spacing: -0.03em; margin-bottom: 16px; }
    .page-title span { color: var(--accent); }
    .page-desc { font-size: 1rem; color: var(--muted); max-width: 500px; line-height: 1.8; }

    .entries-section { padding: 72px 56px; }
    .section-eyebrow { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
    .section-title { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 36px; }

    .diary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

    .diary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; text-decoration: none; color: var(--text);
      display: flex; flex-direction: column; transition: border-color 0.2s, transform 0.2s;
      position: relative;
    }
    .diary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); }
    .diary-card:hover { border-color: rgba(245,166,108,0.4); transform: translateY(-5px); }
    .diary-thumb { width: 100%; height: 220px; object-fit: cover; display: block; background: var(--surface2); }
    .diary-body { padding: 28px; flex: 1; display: flex; flex-direction: column; }
    .diary-cat { font-size: 0.68rem; letter-spacing: 0.16em; color: var(--accent); text-transform: uppercase; margin-bottom: 7px; }
    .diary-name { font-size: 1.3rem; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 10px; line-height: 1.2; }
    .diary-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.75; flex: 1; }
    .diary-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); }
    .diary-arrow { color: var(--accent); }

    .diary-card.coming { border-style: dashed; opacity: 0.45; pointer-events: none; align-items: center; justify-content: center; min-height: 280px; }
    .coming-inner { text-align: center; padding: 40px; }
    .coming-icon { font-size: 2.5rem; margin-bottom: 14px; opacity: 0.4; }
    .coming-text { font-size: 0.88rem; color: var(--muted); }

    footer { padding: 48px 56px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { font-size: 0.9rem; font-weight: 900; }
    .footer-logo span { color: #6cb8f5; }
    .footer-text { font-size: 0.77rem; color: var(--muted); }

    .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.55s ease, transform 0.55s ease; }
    .reveal.visible { opacity: 1; transform: none; }

    @media (max-width: 768px) {
      nav { padding: 0 16px; height: 56px; }
      .nav-links { gap: 2px; }
      .nav-links a { font-size: 0.72rem; padding: 4px 8px; }
      .page-header { padding: 90px 20px 40px; }
      .page-header::before { font-size: 6rem; right: 20px; top: 50px; }
      .entries-section { padding: 48px 20px; }
      .diary-grid { grid-template-columns: 1fr; }
      .diary-thumb { height: 180px; }
      footer { padding: 28px 20px; flex-direction: column; gap: 6px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">MY<span>.</span>BLOG</a>
  <ul class="nav-links">
    <li><a href="../travel/index.html">✈️ 여행</a></li>
    <li><a href="../dev/index.html">💻 개발</a></li>
    <li><a href="../diary/index.html" class="active">📝 일기</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">홈</a><span>›</span><span>일기</span></div>
  <h1 class="page-title">나의 <span>일기</span></h1>
  <p class="page-desc">별거 없는 하루, 별거 있는 하루. 지나가는 생각들을 흘려보내지 않기 위해 쓰는 기록.</p>
</div>

<section class="entries-section">
  <p class="section-eyebrow reveal">✦ All Entries</p>
  <h2 class="section-title reveal">전체 일기</h2>
  <div class="diary-grid">

    <a class="diary-card reveal" href="wedding/index.html">
      <img class="diary-thumb" src="wedding/images/03-04_1.jpg" alt="웨딩" />
      <div class="diary-body">
        <div class="diary-cat">💍 Wedding</div>
        <h3 class="diary-name">웨딩 촬영 일기</h3>
        <p class="diary-desc">스튜디오에서, 야외 정원에서. 웃음이 끊이지 않았던 우리의 웨딩 촬영 날. 흰 드레스부터 핑크 드레스까지, 25장의 사진.</p>
        <div class="diary-meta">
          <span>📸 25장 · 3가지 의상</span>
          <span class="diary-arrow">→</span>
        </div>
      </div>
    </a>

    <div class="diary-card coming">
      <div class="coming-inner"><div class="coming-icon">📝</div><p class="coming-text">새 일기가 추가됩니다</p></div>
    </div>

  </div>
</section>

<footer>
  <div class="footer-logo">MY<span>.</span>BLOG</div>
  <div class="footer-text">📝 일기</div>
</footer>

<script>
const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }), {threshold:0.08});
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
</script>
</body>
</html>
