<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>타임라인 — MY.BLOG</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0c0f;--surface:#13161a;--surface2:#1a1e24;--border:#252a32;--text:#eef0f3;--muted:#7a8494;
          --travel:#6cb8f5;--diary:#d4a8b8;--dev:#4ade80;--radius:12px}
    body{background:var(--bg);color:var(--text);font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;line-height:1.6}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
      padding:0 56px;height:64px;background:rgba(10,12,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .nav-logo{font-size:1rem;font-weight:900;letter-spacing:.06em;color:var(--text);text-decoration:none}
    .nav-logo span{color:var(--travel)}
    .nav-links{display:flex;gap:8px;list-style:none}
    .nav-links a{font-size:.82rem;color:var(--muted);text-decoration:none;padding:6px 14px;border-radius:999px;transition:color .2s,background .2s}
    .nav-links a:hover{color:var(--text);background:var(--surface2)}

    .page-header{padding:140px 56px 64px;border-bottom:1px solid var(--border)}
    .breadcrumb{font-size:.75rem;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:8px}
    .breadcrumb a{color:var(--muted);text-decoration:none}.breadcrumb a:hover{color:var(--text)}
    .page-title{font-size:clamp(2.4rem,5vw,4rem);font-weight:900;letter-spacing:-.03em;margin-bottom:14px}
    .page-desc{font-size:1rem;color:var(--muted);line-height:1.8}
    .page-meta{margin-top:18px;font-size:.82rem;color:var(--muted)}
    .page-meta span{font-weight:700}
    .page-meta .tl-travel{color:var(--travel)}
    .page-meta .tl-diary{color:var(--diary)}
    .page-meta .tl-dev{color:var(--dev)}

    /* ── 레전드 ── */
    .legend{padding:24px 56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:24px}
    .legend-item{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted)}
    .legend-dot{width:10px;height:10px;border-radius:50%}
    .legend-item.travel .legend-dot{background:var(--travel)}
    .legend-item.diary  .legend-dot{background:var(--diary)}
    .legend-item.dev    .legend-dot{background:var(--dev)}

    /* ── 타임라인 ── */
    .timeline-wrap{padding:64px 56px;max-width:800px}

    .tl-group{margin-bottom:52px}
    .tl-month-label{display:flex;align-items:baseline;gap:10px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
    .tl-year{font-size:.8rem;color:var(--muted);letter-spacing:.08em}
    .tl-mon{font-size:1.3rem;font-weight:900;letter-spacing:-.02em}

    .tl-items{display:flex;flex-direction:column;gap:0;padding-left:20px;border-left:2px solid var(--border);position:relative}

    .tl-item{
      display:flex;align-items:center;gap:16px;padding:14px 0;
      text-decoration:none;color:var(--text);
      position:relative;transition:padding-left .2s;
    }
    .tl-item::before{
      content:'';position:absolute;left:-26px;top:50%;transform:translateY(-50%);
      width:10px;height:10px;border-radius:50%;border:2px solid var(--border);
      background:var(--bg);transition:all .2s;
    }
    .tl-item:hover{padding-left:6px}
    .tl-item.tl-travel::before{background:var(--travel);border-color:var(--travel)}
    .tl-item.tl-diary::before{background:var(--diary);border-color:var(--diary)}
    .tl-item.tl-dev::before{background:var(--dev);border-color:var(--dev)}
    .tl-item+.tl-item{border-top:1px solid var(--border)}

    .tl-icon{font-size:1.4rem;flex-shrink:0;width:32px;text-align:center}
    .tl-content{flex:1;min-width:0}
    .tl-title{font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tl-sub{font-size:.78rem;color:var(--muted);margin-top:2px}
    .tl-date{font-size:.73rem;color:var(--muted);white-space:nowrap;letter-spacing:.04em}

    .tl-type-badge{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;
      padding:2px 8px;border-radius:4px;font-weight:700;white-space:nowrap;flex-shrink:0}
    .tl-travel .tl-type-badge{background:rgba(108,184,245,.12);color:var(--travel)}
    .tl-diary  .tl-type-badge{background:rgba(212,168,184,.12);color:var(--diary)}
    .tl-dev    .tl-type-badge{background:rgba(74,222,128,.12);color:var(--dev)}

    .tl-empty{text-align:center;padding:80px;color:var(--muted)}

    footer{padding:48px 56px;background:var(--surface);border-top:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between}
    .footer-logo{font-size:.9rem;font-weight:900}.footer-logo span{color:var(--travel)}
    .footer-text{font-size:.77rem;color:var(--muted)}

    .reveal{opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease}
    .reveal.visible{opacity:1;transform:none}

    @media(max-width:768px){
      nav{padding:0 16px;height:56px}.nav-links a{font-size:.72rem;padding:4px 8px}
      .page-header{padding:90px 20px 40px}.timeline-wrap{padding:40px 20px}
      .legend{padding:16px 20px;gap:14px}
      .tl-date{display:none}
      footer{padding:28px 20px;flex-direction:column;gap:6px}
    }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="../index.html">MY<span>.</span>BLOG</a>
  <ul class="nav-links">
    <li><a href="../travel/index.html">✈️ 여행</a></li>
    <li><a href="../dev/index.html">💻 개발</a></li>
    <li><a href="../diary/index.html">📝 일기</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">홈</a><span>›</span><span>타임라인</span></div>
  <h1 class="page-title">타임라인</h1>
  <p class="page-desc">여행, 개발, 일기를 날짜 순서로 모아봤습니다.</p>
  <p class="page-meta">총 <span id="tl-total">-</span>개의 기록</p>
</div>

<div class="legend">
  <div class="legend-item travel"><div class="legend-dot"></div>여행</div>
  <div class="legend-item diary"><div class="legend-dot"></div>일기</div>
  <div class="legend-item dev"><div class="legend-dot"></div>개발</div>
</div>

<div class="timeline-wrap">
  <div id="timeline-container">
    <div class="tl-empty">로딩 중...</div>
  </div>
</div>

<footer>
  <div class="footer-logo">MY<span>.</span>BLOG</div>
  <div class="footer-text">📅 타임라인</div>
</footer>

<script src="../data.js"></script>
<script src="../js/blog.js"></script>
<script>
// blog.js의 initTimeline을 덮어써서 타입 배지 포함 버전으로 렌더
async function initTimeline() {
  const data = await getData();
  const events = [];
  const MONTHS = ['','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const LABELS = { travel: '여행', diary: '일기', dev: '개발' };

  (data.travel||[]).forEach(t => {
    if (!t.date) return;
    events.push({ date: t.date, type: 'travel', title: t.title, sub: t.country, icon: t.flag||'✈️', href: `../travel/${t.id}/index.html` });
  });
  (data.diary||[]).forEach(d => {
    if (!d.date) return;
    events.push({ date: d.date, type: 'diary', title: d.title, sub: d.category, icon: '📝', href: `../diary/${d.id}/index.html` });
  });
  (data.dev||[]).forEach(d => {
    if (!d.date) return;
    events.push({ date: d.date, type: 'dev', title: d.title, sub: d.category, icon: '💻', href: `../dev/${d.id}/index.html` });
  });

  events.sort((a, b) => new Date(b.date) - new Date(a.date));

  const totalEl = document.getElementById('tl-total');
  if (totalEl) totalEl.textContent = events.length;

  if (!events.length) {
    document.getElementById('timeline-container').innerHTML = '<div class="tl-empty">아직 기록이 없습니다.<br>여행, 일기, 개발 기록에 날짜를 추가하면 여기에 표시됩니다.</div>';
    return;
  }

  const groups = {};
  events.forEach(e => {
    const [y, m] = e.date.split('-');
    const key = `${y}-${m.padStart(2,'0')}`;
    if (!groups[key]) groups[key] = { year: y, month: parseInt(m), items: [] };
    groups[key].items.push(e);
  });

  const container = document.getElementById('timeline-container');
  container.innerHTML = Object.entries(groups)
    .sort(([a],[b]) => b.localeCompare(a))
    .map(([, g]) => `
      <div class="tl-group reveal">
        <div class="tl-month-label">
          <span class="tl-year">${g.year}</span>
          <span class="tl-mon">${MONTHS[g.month]}</span>
        </div>
        <div class="tl-items">
          ${g.items.map(e => `
            <a class="tl-item tl-${e.type}" href="${e.href}">
              <div class="tl-icon">${e.icon}</div>
              <div class="tl-content">
                <div class="tl-title">${h(e.title)}</div>
                <div class="tl-sub">${h(e.sub)}</div>
              </div>
              <span class="tl-type-badge">${LABELS[e.type]}</span>
              <span class="tl-date">${e.date}</span>
            </a>`).join('')}
        </div>
      </div>`).join('');

  initReveal();
}
initTimeline();
</script>
</body>
</html>
