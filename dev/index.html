<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>개발 기록 — MY.BLOG</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0c0f;--surface:#13161a;--surface2:#1a1e24;--border:#252a32;--text:#eef0f3;--muted:#7a8494;--accent:#4ade80;--radius:14px}
    body{background:var(--bg);color:var(--text);font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;line-height:1.6}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 56px;height:64px;background:rgba(10,12,15,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .nav-logo{font-size:1rem;font-weight:900;letter-spacing:.06em;color:var(--text);text-decoration:none}.nav-logo span{color:#6cb8f5}
    .nav-links{display:flex;gap:8px;list-style:none}.nav-links a{font-size:.82rem;color:var(--muted);text-decoration:none;padding:6px 14px;border-radius:999px;transition:color .2s,background .2s}.nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--surface2)}
    .page-header{padding:140px 56px 64px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
    .page-header::before{content:'💻';position:absolute;right:80px;top:80px;font-size:11rem;opacity:.04;pointer-events:none}
    .breadcrumb{font-size:.75rem;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:8px}.breadcrumb a{color:var(--muted);text-decoration:none}.breadcrumb a:hover{color:var(--text)}
    .page-title{font-size:clamp(2.4rem,5vw,4rem);font-weight:900;letter-spacing:-.03em;margin-bottom:16px}.page-title span{color:var(--accent)}
    .page-desc{font-size:1rem;color:var(--muted);max-width:500px;line-height:1.8}
    .page-meta{margin-top:20px;font-size:.8rem;color:var(--muted)}
    .page-meta span{color:var(--accent);font-weight:700}
    .dev-section{padding:64px 56px}
    .dev-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
    .dev-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s}
    .dev-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:0;transition:opacity .2s}
    .dev-card:hover{border-color:rgba(74,222,128,.4);transform:translateY(-4px)}.dev-card:hover::before{opacity:1}
    .dev-card-top{display:flex;align-items:center;justify-content:space-between}
    .dev-cat-badge{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);padding:3px 10px;border-radius:4px;font-weight:700}
    .dev-date{font-size:.73rem;color:var(--muted);letter-spacing:.04em}
    .dev-card-title{font-size:1.1rem;font-weight:800;letter-spacing:-.015em;line-height:1.3}
    .dev-card-desc{font-size:.85rem;color:var(--muted);line-height:1.7;flex:1}
    .dev-tags{display:flex;gap:6px;flex-wrap:wrap}
    .dev-tag{font-size:.7rem;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:3px 9px;border-radius:999px}
    .dev-card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border);font-size:.75rem;color:var(--muted)}
    .dev-arrow{color:var(--accent)}
    .dev-empty{grid-column:span 2;text-align:center;padding:60px;color:var(--muted);font-size:.95rem}
    footer{padding:48px 56px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .footer-logo{font-size:.9rem;font-weight:900}.footer-logo span{color:#6cb8f5}.footer-text{font-size:.77rem;color:var(--muted)}
    .reveal{opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease}.reveal.visible{opacity:1;transform:none}
    @media(max-width:768px){nav{padding:0 16px;height:56px}.nav-links a{font-size:.72rem;padding:4px 8px}.page-header{padding:90px 20px 40px}.dev-section{padding:40px 20px}.dev-grid{grid-template-columns:1fr}.dev-empty{grid-column:span 1}footer{padding:28px 20px;flex-direction:column;gap:6px}}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="../index.html">MY<span>.</span>BLOG</a>
  <ul class="nav-links">
    <li><a href="../travel/index.html">✈️ 여행</a></li>
    <li><a href="../dev/index.html" class="active">💻 개발</a></li>
    <li><a href="../diary/index.html">📝 일기</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">홈</a><span>›</span><span>개발</span></div>
  <h1 class="page-title">개발 <span>기록</span></h1>
  <p class="page-desc">만든 것, 배운 것, 삽질한 것. HTML 코드 실행 결과와 함께 기록하는 개발 메모.</p>
  <p class="page-meta">총 <span id="dev-total">0</span>개의 기록</p>
</div>
<section class="dev-section">
  <div class="dev-grid" id="dev-grid"></div>
</section>
<footer>
  <div class="footer-logo">MY<span>.</span>BLOG</div>
  <div class="footer-text">💻 개발 기록</div>
</footer>
<script src="../data.js"></script>
<script src="../js/blog.js"></script>
<script>initDevList();</script>
</body>
</html>
