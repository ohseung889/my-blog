<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개발 기록 — MY.BLOG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c0f; --surface: #13161a; --surface2: #1a1e24;
      --border: #252a32; --text: #eef0f3; --muted: #7a8494;
      --accent: #7eed9b; --radius: 16px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; line-height: 1.6; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 56px; height: 64px;
      background: rgba(10,12,15,0.88); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-size: 1rem; font-weight: 900; letter-spacing: 0.06em; color: var(--text); text-decoration: none; }
    .nav-logo span { color: #6cb8f5; }
    .nav-links { display: flex; gap: 8px; list-style: none; }
    .nav-links a {
      font-size: 0.82rem; color: var(--muted); text-decoration: none;
      padding: 6px 14px; border-radius: 999px;
      transition: color 0.2s, background 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--surface2); }

    .page-header {
      padding: 140px 56px 72px; border-bottom: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .page-header::before {
      content: '💻'; position: absolute; right: 80px; top: 80px;
      font-size: 12rem; opacity: 0.04; pointer-events: none;
    }
    .breadcrumb { font-size: 0.75rem; color: var(--muted); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--text); }
    .page-title { font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 900; letter-spacing: -0.03em; margin-bottom: 16px; }
    .page-title span { color: var(--accent); }
    .page-desc { font-size: 1rem; color: var(--muted); max-width: 500px; line-height: 1.8; }

    /* EMPTY STATE */
    .empty-section { padding: 100px 56px; display: flex; align-items: center; justify-content: center; }
    .empty-card {
      text-align: center; padding: 80px 60px;
      background: var(--surface); border: 1px dashed var(--border);
      border-radius: var(--radius); max-width: 480px; width: 100%;
    }
    .empty-icon { font-size: 3rem; margin-bottom: 20px; opacity: 0.5; }
    .empty-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em; }
    .empty-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.8; }
    .empty-tags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 24px; }
    .tag {
      font-size: 0.72rem; padding: 5px 12px; border-radius: 999px;
      background: rgba(126,237,155,0.1); color: var(--accent);
      border: 1px solid rgba(126,237,155,0.2);
    }

    footer {
      padding: 48px 56px; background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: fixed; bottom: 0; left: 0; right: 0;
    }
    .footer-logo { font-size: 0.9rem; font-weight: 900; }
    .footer-logo span { color: #6cb8f5; }
    .footer-text { font-size: 0.77rem; color: var(--muted); }

    @media (max-width: 768px) {
      nav { padding: 0 16px; height: 56px; }
      .nav-links a { font-size: 0.72rem; padding: 4px 8px; }
      .page-header { padding: 90px 20px 40px; }
      .page-header::before { font-size: 6rem; right: 20px; top: 50px; }
      .empty-section { padding: 56px 20px; }
      footer { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">MY<span>.</span>BLOG</a>
  <ul class="nav-links">
    <li><a href="../travel/index.html">✈️ 여행</a></li>
    <li><a href="../dev/index.html" class="active">💻 개발</a></li>
    <li><a href="../diary/index.html">📝 일기</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="breadcrumb">
    <a href="../index.html">홈</a>
    <span>›</span>
    <span>개발</span>
  </div>
  <h1 class="page-title">개발 <span>기록</span></h1>
  <p class="page-desc">만든 것, 배운 것, 삽질한 것. 프로젝트 기록과 기술 메모를 쌓아두는 공간.</p>
</div>

<div class="empty-section">
  <div class="empty-card">
    <div class="empty-icon">💻</div>
    <h3 class="empty-title">곧 시작합니다</h3>
    <p class="empty-desc">프로젝트 기록, 학습 메모, TIL(Today I Learned) 등<br />개발 관련 기록들이 여기에 채워질 예정입니다.</p>
    <div class="empty-tags">
      <span class="tag">Project</span>
      <span class="tag">TIL</span>
      <span class="tag">Review</span>
      <span class="tag">Troubleshoot</span>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">MY<span>.</span>BLOG</div>
  <div class="footer-text">💻 개발 기록</div>
</footer>
</body>
</html>
